		<!-- Script SIMPLE para mapa - antes de app.js -->
		<script>
			// Inicializar Leaflet inmediatamente - sin dependencias
			if(typeof L === 'undefined') {
				console.error('❌ Leaflet no está disponible');
			} else {
				console.log('✓ Leaflet versión:', L.version);
				
				var mapDiv = document.querySelector('.map');
				if(!mapDiv) {
					console.error('❌ No encontré DIV .map');
				} else {
					console.log('✓ DIV .map encontrado:', mapDiv);
					
					try {
						var mapa = L.map(mapDiv).setView([-11.1095, -77.6019], 16);
						console.log('✓ Mapa creado');
						
						L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
							attribution: '© OpenStreetMap',
							maxZoom: 19
						}).addTo(mapa);
						console.log('✓ Tiles agregadas');
						
						L.marker([-11.1095, -77.6019])
							.addTo(mapa)
							.bindPopup('<b>Takibatú</b><br>Huacho, Perú')
							.openPopup();
						console.log('✓ Marcador añadido');
						
						setTimeout(function() {
							mapa.invalidateSize();
							console.log('✓ Tamaño ajustado');
						}, 100);
						
						console.log('✅ MAPA COMPLETAMENTE FUNCIONAL');
					} catch(error) {
						console.error('❌ Error:', error.message);
					}
				}
			}
		</script>
